name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev

      - name: Install Python Tools
        run: |
          pip install --upgrade pip
          pip install setuptools cython
          pip install buildozer

      - name: Build APK (Force Accept Licenses)
        run: |
          # هذا هو السطر السحري: سيقوم بالرد بـ "y" تلقائياً على أي طلب ترخيص
          yes | buildozer android debug
        env:
          # نضمن للنظام أننا وافقنا على التراخيص عبر متغيرات البيئة أيضاً
          APP_ACCEPT_SDK_LICENSE: "1"
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
          
