name: Build Windows EXE

on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install All Necessary Libraries
        run: |
          python -m pip install --upgrade pip
          # قمت بجمع المكتبات الأساسية التي يحتاجها أي تطبيق Kivy/KivyMD
          # يمكنك إضافة أي مكتبات إضافية تستخدمها في مشروعك هنا
          pip install pyinstaller kivy kivymd pandas openpyxl pillow

      - name: Build EXE (One-File)
        run: |
          # بناء الملف كملف واحد (.exe) بدون شاشة كونسول سوداء
          # تأكد أن اسم ملف الكود الرئيسي هو main.py
          pyinstaller --onefile --noconsole --name WorkshopApp main.py

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WorkshopApp-Windows-Final
          path: dist/*.exe
          
