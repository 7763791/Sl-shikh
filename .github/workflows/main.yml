name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip3 install --user --upgrade buildozer cython virtualenv
          
      - name: Build with Buildozer
        run: |
          export PATH=$PATH:~/.local/bin/
          # حذف أي إعدادات قديمة مشوهة لضمان بداية نظيفة
          rm -rf .buildozer
          # الموافقة التلقائية وبدء البناء
          buildozer android debug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Workshop-App
          path: bin/*.apk
