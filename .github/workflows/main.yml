name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install All Necessary Dependencies
        run: |
          sudo apt update
          # هذه القائمة تشمل كل ما يحتاجه Buildozer للعمل بنجاح
          sudo apt install -y python3-pip git zip unzip openjdk-17-jdk python3-venv autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo-dev cmake libffi-dev libssl-dev build-essential lld libncurses5 libncursesw5

      - name: Install Python Tools
        run: |
          python3 -m pip install --upgrade pip
          # تثبيت المكتبات الأساسية لعملية البناء
          python3 -m pip install --user --upgrade Cython==0.29.33 wheel buildozer

      - name: Build APK
        run: |
          # تجاوز تحذيرات الـ Root لضمان سلاسة البناء
          export BUILDOZER_WARN_ON_ROOT=0
          # البناء بدون كاش لتجنب أي تداخل مع محاولات سابقة فاشلة
          yes | buildozer -v android debug --no-cache

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WorkshopApp-Final
          path: bin/*.apk
          
