name: Build Android APK
on: [push]
jobs:
  build:
    # استخدام هذا الإصدار يضمن توفر مكتبات الأندرويد القديمة والجديدة معاً
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          # تثبيت كل ما يحتاجه الأندرويد من مكتبات وجافا
          sudo apt install -y python3-pip git zip unzip openjdk-17-jdk python3-venv autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev build-essential

      - name: Install Cython and Buildozer
        run: |
          python3 -m pip install --upgrade pip
          # تثبيت المحرك الذي يحول الكود إلى لغة الأندرويد
          python3 -m pip install --user --upgrade Cython==0.29.33 wheel buildozer
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build Android APK
        run: |
          # الموافقة على رخص جوجل أندرويد والبدء في صنع ملف الـ APK
          yes | buildozer -v android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Workshop-App-Android
          path: bin/*.apk
