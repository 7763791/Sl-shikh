name: Build Windows EXE

on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install All Necessary Libraries
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller kivy[base]
          pip install https://github.com/kivymd/KivyMD/archive/master.zip
          pip install pandas openpyxl pillow

      - name: Build EXE (Final Attempt)
        run: |
          # إضافة مسار المكتبات يدوياً لضمان عدم ضياع أي ملف
          python -m PyInstaller --noconsole --onefile --name WorkshopApp main.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: WorkshopApp-Final-EXE
          path: dist/*.exe
          
